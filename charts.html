<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Stock Movers Chart</title>

    <!-- fonts -->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">

    <!-- theme css -->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

</head>

<body id="page-top">

<div id="wrapper">

    <!-- Sidebar -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion">

        <a class="sidebar-brand d-flex align-items-center justify-content-center" href="index.html">
            <div class="sidebar-brand-text mx-3">
                Stock Movers
            </div>
        </a>

        <hr class="sidebar-divider">

        <li class="nav-item">
            <a class="nav-link" href="index.html">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li class="nav-item active">
            <a class="nav-link" href="charts.html">
                <i class="fas fa-chart-bar"></i>
                <span>Chart</span>
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="tables.html">
                <i class="fas fa-table"></i>
                <span>Table</span>
            </a>
        </li>

    </ul>

    <!-- Content -->
    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">
                    Percent Change Trend (Top Movers)
                </h1>

                <!-- Chart Card -->
                <div class="card shadow mb-4">

                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">
                            Daily Top Movers Percent Change
                        </h6>
                    </div>

                    <div class="card-body">

                        <canvas id="percentChangeChart"></canvas>

                        <p class="mt-3 text-muted">
                            Each bar represents the stock with the largest daily percent change
                            from the watchlist over the last 7 days.
                        </p>

                    </div>

                </div>

            </div>

        </div>

        <footer class="sticky-footer bg-white">
            <div class="container my-auto">
                <div class="text-center my-auto">
                    <span>Stock Movers Dashboard</span>
                </div>
            </div>
        </footer>

    </div>

</div>


<!-- scripts -->
<script src="vendor/jquery/jquery.min.js"></script>
<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="vendor/jquery-easing/jquery.easing.min.js"></script>
<script src="js/sb-admin-2.min.js"></script>

<!-- chart library -->
<script src="vendor/chart.js/Chart.min.js"></script>


<script>

async function loadStockChart() {

    const response = await fetch(
        "https://0o6g6j04p2.execute-api.us-east-2.amazonaws.com/movers"
    );

    const data = await response.json();

    const labels = data.map(item => item.date);

    const values = data.map(item => item.percent_change);

    const ctx = document.getElementById("percentChangeChart");

    new Chart(ctx, {

        type: "bar",

        data: {

            labels: labels,

            datasets: [{

                label: "Percent Change (%)",

                data: values

            }]

        },

        options: {

            responsive: true,

            scales: {

                y: {

                    beginAtZero: true

                }

            }

        }

    });

}

loadStockChart();

</script>


</body>
</html>
