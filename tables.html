<div id="content-wrapper">

<div id="content">


<nav class="navbar navbar-light bg-white shadow mb-4">

<h5 class="m-0 font-weight-bold text-primary">

Stock Movers Table

</h5>

<button id="refreshBtn" class="btn btn-primary btn-sm">

Refresh

</button>

</nav>


<div class="container-fluid">


<div class="card shadow mb-4">

<div class="card-header">

<h6 class="m-0 font-weight-bold text-primary">

Top Movers (Last 7 Days)

</h6>

</div>


<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered" id="moversTable">

<thead>

<tr>

<th>Date</th>

<th>Ticker</th>

<th>Percent Change</th>

<th>Close Price</th>

</tr>

</thead>


<tbody id="tableBody">

<tr>

<td colspan="4" class="text-center">

Waiting for data...

</td>

</tr>

</tbody>


</table>

</div>

</div>

</div>



<div class="card shadow">

<div class="card-body">

<strong>API Endpoint:</strong>

<div id="apiUrl">

https://YOUR-API-ID.execute-api.REGION.amazonaws.com/prod/movers

</div>

</div>

</div>


</div>

</div>

</div>

</div>



<script src="vendor/jquery/jquery.min.js"></script>
<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

<script src="vendor/datatables/jquery.dataTables.min.js"></script>
<script src="vendor/datatables/dataTables.bootstrap4.min.js"></script>

<script>

const API_URL =
"https://yx6tfjk7ki.execute-api.us-east-2.amazonaws.com/movers";

const tableBody =
document.getElementById("tableBody");

const refreshBtn =
document.getElementById("refreshBtn");


function percentColor(value){

const num = Number(value);

if(num>0){

return `<span class="positive">+${num.toFixed(2)}%</span>`;

}

if(num<0){

return `<span class="negative">${num.toFixed(2)}%</span>`;

}

return `<span class="neutral">${num.toFixed(2)}%</span>`;

}



function priceFormat(value){

const num = Number(value);

if(isNaN(num)){

return "N/A";

}

return "$"+num.toFixed(2);

}



function render(data){

if(!data.length){

tableBody.innerHTML =

`<tr>
<td colspan="4" class="text-center">
No data returned
</td>
</tr>`;

return;

}


tableBody.innerHTML =

data.map(item =>

`<tr>

<td>${item.date}</td>

<td>
<strong>${item.ticker}</strong>
</td>

<td>
${percentColor(item.percent_change)}
</td>

<td>
${priceFormat(item.close_price)}
</td>

</tr>`

).join("");

$('#moversTable').DataTable();

}



async function loadData(){

tableBody.innerHTML =

`<tr>
<td colspan="4" class="text-center">
Loading...
</td>
</tr>`;


try{

const response =
await fetch(API_URL);

const json =
await response.json();

render(json);

}

catch(err){

tableBody.innerHTML =

`<tr>
<td colspan="4" class="text-danger text-center">
Error loading data
</td>
</tr>`;

console.log(err);

}

}



refreshBtn.addEventListener(
"click",
loadData
);


loadData();

</script>


</body>

</html>
